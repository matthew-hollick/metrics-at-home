[common]
# Prefix for store all internal carbon-clickhouse graphs. Supported macroses: {host}
metric-prefix = "carbon.agents.{host}"
# Endpoint for store internal carbon metrics. Valid values: "" or "local", "tcp://host:port", "udp://host:port"
metric-endpoint = "local"
# Interval of storing internal metrics. Like CARBON_METRIC_INTERVAL
metric-interval = "1m0s"
# GOMAXPROCS
max-cpu = 1

[logging]
# "stderr", "stdout" can be used as file name
file = "stdout"
# Logging error level. Valid values: "debug", "info", "warn" "error"
level = "info"

[data]
path = "/tmp"
chunk-interval = "1s"
chunk-auto-interval = ""

[graphite_new.graphite]
type = "points"
table = "graphite"
threads = 1
url = "http://clickhouse:8123/"
timeout = "30s"
zero-timestamp = true

[graphite_new.graphite_index]
type = "index"
table = "graphite_index"
threads = 1
url = "http://clickhouse:8123/"
timeout = "30s"
cache-ttl = "12h0m0s"
disable-daily-index = false

[tcp]
listen = ":2003"
enabled = true
drop-future = "0s"
drop-past = "0s"
drop-longer-than = 0

[grpc]
listen = ":2005"
enabled = false
drop-future = "0s"
drop-past = "0s"
drop-longer-than = 0

[prometheus]
listen = ":2006"
enabled = false
drop-future = "0s"
drop-past = "0s"
drop-longer-than = 0
